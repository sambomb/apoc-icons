<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Time Engine Pro</title>
<style>
body{background:#0b0b0b;color:white;font-family:Arial;padding:20px}
.box{margin-bottom:10px}
</style>
</head>

<body>

<h2>Time Engine Pro</h2>

<div class="box" id="local"></div>
<div class="box" id="apoc"></div>
<div class="box" id="current"></div>
<div class="box" id="next"></div>
<div class="box" id="countdown"></div>

<script src="timecalc.js"></script>

<script>

const events=["Vehicle","Shelter","Army","Science","Hero","Army"]

function update(){

  const now = new Date()
  const apoc = getApocNow()
  const slot = getCurrentSlot()
  const next = getNextSlot()
  const cd = getCountdown()

  document.getElementById("local").innerText =
    "Local: " + formatTime(now)

  document.getElementById("apoc").innerText =
    "Apocalypse: " + formatTime(apoc)

  document.getElementById("current").innerText =
    "Current Slot: Day " + slot.day + " | " + slot.start + ":00"

  document.getElementById("next").innerText =
    "Next Slot: Day " + next.day + " | " + APOC_TIMES[next.index] + ":00"

  document.getElementById("countdown").innerText =
    "Next in: " + cd.h + "h " + cd.m + "m " + cd.s + "s"

}

setInterval(update,1000)
update()

</script>

</body>
</html>
