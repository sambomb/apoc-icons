<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white}

/* TOP */
#topBar{display:flex;justify-content:space-between;padding:10px;background:#111;flex-wrap:wrap}

#alertBar{
color:#ff3b3b;
font-weight:bold;
animation:pulseAlert 1.5s infinite;
}

@keyframes pulseAlert{
0%{opacity:0.6}
50%{opacity:1}
100%{opacity:0.6}
}

/* FILTERS FIXED */
#eventFilters{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:6px;
padding:10px;
}

#eventFilters button{
padding:6px 10px;
background:#222;
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}

#eventFilters button.active{
background:#c21414;
}

/* TABLE */
#apocTable{width:100%;border-collapse:collapse;text-align:center}
#apocTable th,#apocTable td{border:1px solid #2a2a2a;padding:6px;transition:0.2s}

.currentColumn{background:#7a0f0f}

/* ICON */
.cellIcon{width:18px;margin-bottom:4px}

/* EVENTS */
.event{font-size:12px}

/* RED RADAR */
.redEvent{
color:#ff3b3b;
font-weight:bold;
text-shadow:0 0 8px #ff0000;
}

/* ACTIVE */
.activeEvent{
box-shadow:0 0 12px #00ffcc;
}

</style>
</head>

<body>

<div id="topBar">
<div>
<div id="currentEventBar"></div>
<div id="alertBar"></div>
</div>

<div>
<button onclick="toggleTimeFormat()">24H</button>
</div>
</div>

<div id="eventFilters">
<button onclick="filterEvents('all')" id="btnAll">All</button>
<button onclick="filterEvents('Army')" id="btnArmy">Army</button>
<button onclick="filterEvents('Hero')" id="btnHero">Hero</button>
<button onclick="filterEvents('Shelter')" id="btnShelter">Shelter</button>
<button onclick="filterEvents('Vehicle')" id="btnVehicle">Vehicle</button>
<button onclick="filterEvents('Science')" id="btnScience">Science</button>
</div>

<table id="apocTable">
<thead>
<tr>
<th>Time</th>
<th data-day="0">Sun</th>
<th data-day="1">Mon</th>
<th data-day="2">Tue</th>
<th data-day="3">Wed</th>
<th data-day="4">Thu</th>
<th data-day="5">Fri</th>
<th data-day="6">Sat</th>
</tr>
</thead>
<tbody id="tableBody">
<tr><td>00:00</td></tr>
<tr><td>04:00</td></tr>
<tr><td>08:00</td></tr>
<tr><td>12:00</td></tr>
<tr><td>16:00</td></tr>
<tr><td>20:00</td></tr>
</tbody>
</table>

<script>

// ICONS (safe)
const ICONS={
white:"https://cdn.jsdelivr.net/gh/sambomb/zcalendar@main/white.png",
red:"https://cdn.jsdelivr.net/gh/sambomb/zcalendar@main/red.png",
gold:"https://cdn.jsdelivr.net/gh/sambomb/zcalendar@main/gold.png"
}

// EVENTS
const events=[["Mod Vehicle Boost","Shelter Upgrade","Army Expansion","Age of Science","Hero Initiative","Army Expansion"],
["Shelter Upgrade","Age of Science","Mod Vehicle Boost","Hero Initiative","Army Expansion","Mod Vehicle Boost"],
["Age of Science","Hero Initiative","Shelter Upgrade","Army Expansion","Mod Vehicle Boost","Shelter Upgrade"],
["Hero Initiative","Army Expansion","Age of Science","Mod Vehicle Boost","Shelter Upgrade","Age of Science"],
["Army Expansion","Mod Vehicle Boost","Hero Initiative","Shelter Upgrade","Age of Science","Hero Initiative"],
["Mod Vehicle Boost","Shelter Upgrade","Army Expansion","Age of Science","Hero Initiative","Army Expansion"],
["Age of Science","Mod Vehicle Boost","Hero Initiative","Shelter Upgrade","Army Expansion","Hero Initiative"]]

let currentFilter="all"

function buildTable(){
let b=document.getElementById("tableBody")
for(let r=0;r<b.rows.length;r++){
for(let c=0;c<7;c++){
let td=document.createElement("td")
td.className="timeCell"
b.rows[r].appendChild(td)
}}}

function filterEvents(type){
currentFilter=type

document.querySelectorAll("#eventFilters button").forEach(btn=>{
btn.classList.remove("active")
})

document.getElementById("btn"+type.charAt(0).toUpperCase()+type.slice(1)).classList.add("active")

document.querySelectorAll(".timeCell").forEach(cell=>{
if(type==="all"){cell.style.opacity=1;return}
cell.style.opacity=cell.innerText.includes(type)?1:0.2
})
}

function updateCalendar(){

let now=new Date()
let currentDay=now.getDay()
let currentHour=now.getHours()

let cells=document.querySelectorAll(".timeCell")
let index=0
let alert=false

for(let r=0;r<6;r++){
for(let c=0;c<7;c++){

let hour=[0,4,8,12,16,20][r]

let icon="white"
if(c===0)icon="red"
else if(c===1)icon="gold"
else if(c===3&&hour>=16)icon="red"
else if(c===4)icon="red"
else if(c===5)icon="gold"
else if(c===6&&hour>=16)icon="red"

let event=events[c][r]

cells[index].innerHTML=`<img src="${ICONS[icon]}" class="cellIcon"><div>${hour}:00</div><div class="event">${event}</div>`

// current column
if(c===currentDay)cells[index].classList.add("currentColumn")

// red highlight
if(icon==="red"){
cells[index].classList.add("redEvent")

if(c===currentDay && Math.abs(hour-currentHour)<4){
alert=true
cells[index].classList.add("activeEvent")
}
}

index++
}}

document.getElementById("alertBar").innerText = alert ? "⚠ Do not claim radar missions" : ""
}

buildTable()
updateCalendar()

</script>

</body>
</html>
