<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white}
#topBar{display:flex;justify-content:space-between;padding:10px;background:#111}
#progressBar{height:4px;background:#00ffcc;width:0%}

#langWrapper{position:relative}
#langBtn{background:#222;color:white;border:none;padding:6px;border-radius:6px;cursor:pointer}
#langMenu{display:none;position:absolute;background:#111;border:1px solid #333;border-radius:8px}
#langMenu div{padding:8px;cursor:pointer}
#langMenu div:hover{background:#c21414}
.selectedLang{background:#333}

#eventFilters{text-align:center;padding:10px}
#eventFilters button{margin:4px;padding:6px;background:#222;border:none;color:white;border-radius:4px}

#apocTable{width:100%;border-collapse:collapse;text-align:center}
#apocTable th,#apocTable td{border:1px solid #2a2a2a;padding:6px}
.cellIcon{width:18px;display:block;margin:0 auto 4px}
.event{font-size:12px}
.activeEvent{box-shadow:0 0 10px #00ffcc}
</style>
</head>

<body>

<div id="topBar">
<div id="currentEventBar"></div>

<div>
<button onclick="toggleTimeFormat()" id="timeFormatBtn"></button>

<div id="langWrapper">
<button id="langBtn" onclick="toggleLangMenu()">🌐</button>
<div id="langMenu"></div>
</div>
</div>
</div>

<div id="progressBar"></div>

<div id="eventFilters">
<button onclick="filterEvents('all')" id="btnAll"></button>
<button onclick="filterEvents('Army')" id="btnArmy"></button>
<button onclick="filterEvents('Hero')" id="btnHero"></button>
<button onclick="filterEvents('Shelter')" id="btnShelter"></button>
<button onclick="filterEvents('Vehicle')" id="btnVehicle"></button>
<button onclick="filterEvents('Science')" id="btnScience"></button>
</div>

<table id="apocTable">
<thead>
<tr>
<th id="timeHeader"></th>
<th data-day="0"></th>
<th data-day="1"></th>
<th data-day="2"></th>
<th data-day="3"></th>
<th data-day="4"></th>
<th data-day="5"></th>
<th data-day="6"></th>
</tr>
</thead>
<tbody id="tableBody">
<tr><td>00:00</td></tr>
<tr><td>04:00</td></tr>
<tr><td>08:00</td></tr>
<tr><td>12:00</td></tr>
<tr><td>16:00</td></tr>
<tr><td>20:00</td></tr>
</tbody>
</table>

<script>

// CONFIG
const apocalypseOffsetMinutes=-120
const apocTimes=[0,4,8,12,16,20]

const ICONS={
white:"https://cdn.jsdelivr.net/gh/sambomb/zcalendar@main/white.png",
red:"https://cdn.jsdelivr.net/gh/sambomb/zcalendar@main/red.png",
gold:"https://cdn.jsdelivr.net/gh/sambomb/zcalendar@main/gold.png"
}

// EVENTS
const events=[
["Mod Vehicle Boost","Shelter Upgrade","Army Expansion","Age of Science","Hero Initiative","Army Expansion"],
["Shelter Upgrade","Age of Science","Mod Vehicle Boost","Hero Initiative","Army Expansion","Mod Vehicle Boost"],
["Age of Science","Hero Initiative","Shelter Upgrade","Army Expansion","Mod Vehicle Boost","Shelter Upgrade"],
["Hero Initiative","Army Expansion","Age of Science","Mod Vehicle Boost","Shelter Upgrade","Age of Science"],
["Army Expansion","Mod Vehicle Boost","Hero Initiative","Shelter Upgrade","Age of Science","Hero Initiative"],
["Mod Vehicle Boost","Shelter Upgrade","Army Expansion","Age of Science","Hero Initiative","Army Expansion"],
["Age of Science","Mod Vehicle Boost","Hero Initiative","Shelter Upgrade","Army Expansion","Hero Initiative"]
]

// LANGUAGES + FLAGS
const LANG_LIST={
en:"🇺🇸 EN",
pt:"🇧🇷 PT",
es:"🇪🇸 ES",
it:"🇮🇹 IT",
ru:"🇷🇺 RU",
ko:"🇰🇷 KO",
ja:"🇯🇵 JA"
}

const TEXTS={
en:{time:"Time",current:"Current Event",all:"All",army:"Army",hero:"Hero",shelter:"Shelter",vehicle:"Vehicle",science:"Science"},
pt:{time:"Tempo",current:"Evento Atual",all:"Todos",army:"Exército",hero:"Herói",shelter:"Abrigo",vehicle:"Veículos",science:"Ciência"},
es:{time:"Hora",current:"Evento Actual",all:"Todos",army:"Ejército",hero:"Héroe",shelter:"Refugio",vehicle:"Vehículos",science:"Ciencia"},
it:{time:"Tempo",current:"Evento Attuale",all:"Tutti",army:"Esercito",hero:"Eroe",shelter:"Rifugio",vehicle:"Veicoli",science:"Scienza"},
ru:{time:"Время",current:"Текущее событие",all:"Все",army:"Армия",hero:"Герой",shelter:"Убежище",vehicle:"Техника",science:"Наука"},
ko:{time:"시간",current:"현재 이벤트",all:"전체",army:"군대",hero:"영웅",shelter:"쉘터",vehicle:"차량",science:"과학"},
ja:{time:"時間",current:"現在のイベント",all:"すべて",army:"軍隊",hero:"ヒーロー",shelter:"シェルター",vehicle:"車両",science:"科学"}
}

// EVENT TRANSLATION
const EVENT_TRANSLATIONS={
pt:{"Mod Vehicle Boost":"Veículos","Shelter Upgrade":"Abrigo","Army Expansion":"Exército","Age of Science":"Ciência","Hero Initiative":"Heróis"},
es:{"Mod Vehicle Boost":"Vehículos","Shelter Upgrade":"Refugio","Army Expansion":"Ejército","Age of Science":"Ciencia","Hero Initiative":"Héroes"},
it:{"Mod Vehicle Boost":"Veicoli","Shelter Upgrade":"Rifugio","Army Expansion":"Esercito","Age of Science":"Scienza","Hero Initiative":"Eroi"},
ru:{"Mod Vehicle Boost":"Техника","Shelter Upgrade":"Убежище","Army Expansion":"Армия","Age of Science":"Наука","Hero Initiative":"Герои"},
ko:{"Mod Vehicle Boost":"차량","Shelter Upgrade":"쉘터","Army Expansion":"군대","Age of Science":"과학","Hero Initiative":"영웅"},
ja:{"Mod Vehicle Boost":"車両","Shelter Upgrade":"シェルター","Army Expansion":"軍隊","Age of Science":"科学","Hero Initiative":"ヒーロー"}
}

// DETECT
function detectLang(){
let l=navigator.language.toLowerCase()
for(let k in LANG_LIST){if(l.startsWith(k))return k}
return "en"
}

let LANG=localStorage.getItem("lang")||detectLang()

function T(){return TEXTS[LANG]||TEXTS.en}

function translateEvent(e){
return (EVENT_TRANSLATIONS[LANG]||{})[e]||e
}

// LANG MENU
function buildLangMenu(){
let menu=document.getElementById("langMenu")
menu.innerHTML=""
for(let k in LANG_LIST){
let d=document.createElement("div")
d.innerText=LANG_LIST[k]
if(k===LANG)d.classList.add("selectedLang")
d.onclick=()=>{LANG=k;localStorage.setItem("lang",k);applyUI();updateCalendar();buildLangMenu()}
menu.appendChild(d)
}
}

function toggleLangMenu(){
let m=document.getElementById("langMenu")
m.style.display=m.style.display==="block"?"none":"block"
}

// TIME
let use24h=JSON.parse(localStorage.getItem("use24h")||true)
function toggleTimeFormat(){
use24h=!use24h
localStorage.setItem("use24h",use24h)
applyUI()
updateCalendar()
}

// UI
function applyUI(){
let t=T()
document.getElementById("timeHeader").innerText=t.time
document.getElementById("btnAll").innerText=t.all
document.getElementById("btnArmy").innerText=t.army
document.getElementById("btnHero").innerText=t.hero
document.getElementById("btnShelter").innerText=t.shelter
document.getElementById("btnVehicle").innerText=t.vehicle
document.getElementById("btnScience").innerText=t.science
document.getElementById("timeFormatBtn").innerText=use24h?"24H":"AM/PM"
}

// TABLE
function buildTable(){
let b=document.getElementById("tableBody")
for(let r=0;r<b.rows.length;r++){
for(let c=0;c<7;c++){
let td=document.createElement("td")
td.className="timeCell"
b.rows[r].appendChild(td)
}}}

// UPDATE
function updateCalendar(){

let now=new Date()
let diff=-new Date().getTimezoneOffset()-apocalypseOffsetMinutes

document.querySelectorAll("[data-day]").forEach((th,i)=>{
let d=new Date()
d.setDate(d.getDate()-d.getDay()+i)
th.innerText=d.toLocaleDateString(LANG,{weekday:"short"})
})

let cells=document.querySelectorAll(".timeCell")
let index=0

for(let r=0;r<apocTimes.length;r++){
for(let c=0;c<7;c++){

let base=new Date()
base.setHours(0,0,0,0)
base.setDate(base.getDate()+(c-base.getDay()))
base.setHours(apocTimes[r])
base.setMinutes(base.getMinutes()+diff)

let event=translateEvent(events[c][r])

let icon="white"
if(c===0)icon="red"
else if(c===1)icon="gold"
else if(c===3&&apocTimes[r]>=16)icon="red"
else if(c===4)icon="red"
else if(c===5)icon="gold"
else if(c===6&&apocTimes[r]>=16)icon="red"

let time=base.toLocaleTimeString(LANG,{hour:'2-digit',minute:'2-digit',hour12:!use24h})

cells[index].innerHTML=`<img src="${ICONS[icon]}" class="cellIcon">${time} <span class="event">${event}</span>`

let end=new Date(base)
end.setHours(end.getHours()+4)

if(now>=base&&now<end){
document.getElementById("currentEventBar").innerText=T().current+": "+event
let pct=((now-base)/(end-base))*100
document.getElementById("progressBar").style.width=pct+"%"
}

index++
}}
}

// INIT
buildTable()
buildLangMenu()
applyUI()
updateCalendar()

</script>

</body>
</html>
